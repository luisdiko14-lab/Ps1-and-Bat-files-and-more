<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Files From Repo v2.1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 id="typewriter">Welcome to The Luis PS1-and-BAT Files Repo!</h1>
    <p>Download scripts, explore the repo, or check compatibility. Click any button below to proceed.</p>

    <div class="buttons">
      <button class="btn" id="downloadBtn">Download Files</button>
      <button class="btn" id="viewRepo">View the Repo!</button>
      <button class="btn" id="compatibility">Check Compatibility!</button>
      <button class="btn" id="exploreFiles">Explore All Files</button>
    </div>

    <div id="loader" class="loader hidden"></div>

    <div id="filesSection" class="files-section hidden">
      <h2>All Files in the Repository</h2>
      <div id="fileList" class="file-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
