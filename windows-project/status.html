<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Dashboard</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        overflow: hidden;
    }

    /* LOADING SCREEN */
    #loader {
        position: fixed;
        width: 100%;
        height: 100vh;
        background: #020617;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 9999;
    }

    .spinner {
        width: 60px;
        height: 60px;
        border: 5px solid rgba(255,255,255,0.1);
        border-top: 5px solid #38bdf8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* MAIN CONTENT */
    #content {
        opacity: 0;
        transition: opacity 0.8s ease;
        padding: 40px;
    }

    .card {
        max-width: 1000px;
        margin: auto;
        background: rgba(255,255,255,0.05);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-weight: 600;
        font-size: 28px;
    }

    iframe {
        border-radius: 12px;
    }
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <p>Loading status...</p>
</div>

<!-- MAIN CONTENT -->
<div id="content">
    <div class="card">
        <h1>📊 Uptime Status</h1>

        <script type="text/javascript" src="https://static.hetrix.io/iframeResizer/iframeResizer.min.js"></script>

        <iframe class="htframe"
            src="https://wl.hetrixtools.com/report/uptime/034d518ab3a806745583f5223914b6e5/"
            width="100%"
            scrolling="no"
            style="border:none;"
            sandbox="allow-scripts allow-same-origin allow-popups"
            onload="iFrameResize([{log:false}],'.htframe')">
        </iframe>
    </div>
</div>

<script>
    // 3 second loading
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("content").style.opacity = "1";
        document.body.style.overflow = "auto";
    }, 3000);
</script>

</body>
</html>
