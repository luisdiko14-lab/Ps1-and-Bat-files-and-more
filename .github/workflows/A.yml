name: Extract ZIP and Push Files

on:
  workflow_dispatch:
  push:
    paths:
      - "Incredibox.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ZIP
        run: |
          curl -L -o Incredibox.zip "https://github.com/luisdiko14-lab/Ps1-and-Bat-files-and-more/raw/main/Incredibox.zip"

      - name: Extract ZIP
        run: |
          mkdir -p extracted
          unzip -o Incredibox.zip -d extracted
          echo "Extracted contents:"
          find extracted -maxdepth 3 -print

      - name: Clean old files
        run: |
          shopt -s dotglob nullglob
          rm -rf -- * .[^.]* ..?* || true

      - name: Move extracted files to root
        run: |
          shopt -s dotglob nullglob
          files=(extracted/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No files were extracted."
            exit 1
          fi
          mv "${files[@]}" .
          rm -rf extracted Incredibox.zip

      - name: Commit extracted files
        run: |
          git config user.name "auto-extracter"
          git config user.email "extracter@github.com"
          git add .
          git commit -m "Extracted Incredibox.zip contents" || echo "No changes"

      - name: Push to main
        run: |
          git push origin main
