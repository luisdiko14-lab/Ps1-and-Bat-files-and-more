name: Extract ZIP and Push Files

on:
  workflow_dispatch:
  push:
    paths:
      - "Windows.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ZIP
        run: |
          mkdir -p "$RUNNER_TEMP/work"
          curl -L -o "$RUNNER_TEMP/work/Windows.zip" \
            "https://github.com/luisdiko14-lab/Ps1-and-Bat-files-and-more/raw/main/Windows.zip"

      - name: Extract first ZIP
        run: |
          mkdir -p "$RUNNER_TEMP/work/level1"
          unzip -o "$RUNNER_TEMP/work/Incredibox.zip" -d "$RUNNER_TEMP/work/level1"
          echo "Level 1 contents:"
          find "$RUNNER_TEMP/work/level1" -maxdepth 3 -print

      - name: Extract nested ZIPs
        run: |
          shopt -s nullglob globstar

          mkdir -p "$RUNNER_TEMP/work/final"

          nested_zips=("$RUNNER_TEMP/work/level1"/**/*.zip "$RUNNER_TEMP/work/level1"/*.zip)

          if [ ${#nested_zips[@]} -eq 0 ]; then
            echo "No nested ZIP found, copying level1 contents."
            cp -a "$RUNNER_TEMP/work/level1"/. "$RUNNER_TEMP/work/final"/
          else
            for z in "${nested_zips[@]}"; do
              echo "Extracting nested ZIP: $z"
              base="$(basename "$z" .zip)"
              outdir="$RUNNER_TEMP/work/final/$base"
              mkdir -p "$outdir"
              unzip -o "$z" -d "$outdir"
            done
          fi

          echo "Final contents:"
          find "$RUNNER_TEMP/work/final" -maxdepth 4 -print

      - name: Copy extracted files into repo
        run: |
          shopt -s dotglob nullglob
          cp -a "$RUNNER_TEMP/work/final"/. .

      - name: Commit extracted files
        run: |
          git config user.name "auto-extracter"
          git config user.email "extracter@github.com"
          git add -A
          git commit -m "Extracted Incredibox.zip contents" || echo "No changes"

      - name: Push to main
        run: |
          git push origin main
