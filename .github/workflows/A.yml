name: Extract ZIP and Push Files

on:
  workflow_dispatch:
  push:
    paths:
      - "Incredibox.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ZIP
        run: |
          curl -L -o Incredibox.zip "https://github.com/luisdiko14-lab/Ps1-and-Bat-files-and-more/raw/main/Incredibox.zip"

      - name: Extract first ZIP
        run: |
          rm -rf extracted final
          mkdir -p extracted final
          unzip -o Incredibox.zip -d extracted
          echo "First extraction:"
          find extracted -maxdepth 3 -print

      - name: Extract nested ZIP if present
        run: |
          shopt -s nullglob
          nested_zips=(extracted/*.zip extracted/**/*.zip)
          if [ ${#nested_zips[@]} -eq 0 ]; then
            echo "No nested zip found. Moving extracted files."
            cp -r extracted/* final/ 2>/dev/null || true
          else
            for z in "${nested_zips[@]}"; do
              echo "Extracting nested zip: $z"
              d="final/$(basename "$z" .zip)"
              mkdir -p "$d"
              unzip -o "$z" -d "$d"
            done
          fi

      - name: Clean repo contents
        run: |
          shopt -s dotglob nullglob
          rm -rf -- * .[^.]* ..?* || true

      - name: Move final files to root
        run: |
          shopt -s dotglob nullglob
          if [ -d final ]; then
            mv final/* .
          fi
          rm -rf final extracted Incredibox.zip

      - name: Commit extracted files
        run: |
          git config user.name "auto-extracter"
          git config user.email "extracter@github.com"
          git add .
          git commit -m "Extracted Incredibox.zip contents" || echo "No changes"

      - name: Push to main
        run: |
          git push origin main
