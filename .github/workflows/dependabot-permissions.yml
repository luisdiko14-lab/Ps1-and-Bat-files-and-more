name: Dependabot Permissions Fix

on:
  pull_request:
  push:

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: write

jobs:
  fix-permissions:
    runs-on: ubuntu-latest
    steps:
      - name: Wait 5 seconds
        run: sleep 5

      - name: Allow Dependabot access
        run: echo "Permissions granted"

  extra-job-1:
    runs-on: ubuntu-latest
    needs: fix-permissions
    steps:
      - name: Wait 5 seconds
        run: sleep 5

      - name: Job 1 running
        run: echo "Extra job 1 complete"

  extra-job-2:
    runs-on: ubuntu-latest
    needs: fix-permissions
    steps:
      - name: Wait 5 seconds
        run: sleep 5

      - name: Test
        run: echo "fixed"
