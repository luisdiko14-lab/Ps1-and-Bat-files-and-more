name: Deploy Website via GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Cache npm
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}

      # Cache ./files
      - name: Cache files
        uses: actions/cache@v4
        with:
          path: ./files
          key: ${{ runner.os }}-files-${{ hashFiles('files/**') }}

      - run: npm ci
      - run: npm run build

      # ✅ Artifact 1 (USED for deploy)
      - name: Upload Pages Artifact (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # ✅ Artifact 2 (NOT used by Pages, just stored)
      - name: Upload Extra Artifact (files)
        uses: actions/upload-artifact@v4
        with:
          name: extra-files
          path: ./files
      

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
