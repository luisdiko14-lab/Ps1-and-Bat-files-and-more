name: Extract ZIP and Push

on:
  workflow_dispatch: # manual trigger
  push:
    paths:
      - "Incredibox.zip"

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ZIP
        run: |
          curl -L -o Incredibox.zip https://github.com/luisdiko14-lab/Ps1-and-Bat-files-and-more/raw/main/Incredibox.zip

      - name: Extract ZIP
        run: |
          unzip -o Incredibox.zip -d extracted

      - name: Move files to root
        run: |
          shopt -s dotglob
          mv extracted/* .
          rm -rf extracted Incredibox.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Auto-extracted Incredibox.zip" || echo "No changes to commit"

      - name: Push to main
        run: |
          git push origin main
